<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><title>Kasir HTML</title></head>
<body class="container py-4">
<h2>Kasir Sederhana</h2>
<div class="row g-2">
<div class="col"><input id="nama" class="form-control" placeholder="Nama Produk"></div>
<div class="col"><input id="harga" type="number" class="form-control" placeholder="Harga"></div>
<div class="col-auto"><button class="btn btn-primary" onclick="tambah()">Tambah</button></div>
</div>
<table class="table mt-3"><thead><tr><th>Produk</th><th>Harga</th><th>Aksi</th></tr></thead><tbody id="tb"></tbody></table>
<h4>Total: Rp <span id="total">0</span></h4>
<input id="bayar" type="number" class="form-control" placeholder="Bayar" oninput="hitung()">
<p class="mt-2">Kembalian: <b id="kembali">0</b></p>
<script src="js/app.js"></script></body></html>
